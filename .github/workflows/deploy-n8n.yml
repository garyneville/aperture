# Builds the workflow from TypeScript source, substitutes secrets,
# and deploys to n8n via the REST API.
#
# Triggers:
#   - Push to main (i.e. after PR merge)
#   - Manual dispatch (for ad-hoc redeploys)
#
# Required GitHub Actions secrets — see README or deployment_log.md:
#   N8N_API_KEY, N8N_BASE_URL,
#   GROQ_API_KEY, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID,
#   SENDGRID_API_KEY, EMAIL_FROM,
#   PHOTO_WEATHER_EMAIL_TO, PHOTO_WEATHER_EMAIL_TO_2,
#   PHOTO_WEATHER_DEBUG_EMAIL_TO,
#   PHOTO_BRIEF_TRIGGER_PATH,
#   PHOTO_WEATHER_LAT, PHOTO_WEATHER_LON, PHOTO_WEATHER_LOCATION,
#   PHOTO_WEATHER_TIMEZONE, PHOTO_WEATHER_ICAO,
#   PHOTO_BRIEF_EDITORIAL_PRIMARY_PROVIDER,
#   PHOTO_BRIEF_EDITORIAL_PROMPT_MODE,
#   SUNSETHUE_API_KEY, NASA_API_KEY, GEMINI_API_KEY,
#   APERTURE_GITHUB_PAT

name: Deploy workflow to n8n

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-n8n
  cancel-in-progress: true

jobs:
  test:
    name: Test & build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build generated artifacts
        run: npm run build

      - run: npm run typecheck

      - run: npm test

      - uses: actions/upload-artifact@v4
        with:
          name: workflow-json
          path: generated/workflow/photography-weather-brief.json
          if-no-files-found: error
          retention-days: 5

  deploy:
    name: Deploy to n8n
    needs: test
    runs-on: self-hosted
    environment: production
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workflow-json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Normalise base URL once
        env:
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
        run: |
          BASE_URL=$(python3 -c "import os; print(os.environ['N8N_BASE_URL'].strip().rstrip('/'))")
          echo "N8N_BASE_URL_NORM=${BASE_URL}" >> "$GITHUB_ENV"
          HOSTNAME=$(python3 -c "from urllib.parse import urlparse; import os; print(urlparse(os.environ['N8N_BASE_URL'].strip()).hostname or '(invalid)')")
          echo "Using n8n host: ${HOSTNAME}"

      - name: Substitute secrets into workflow JSON
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          PHOTO_WEATHER_EMAIL_TO: ${{ secrets.PHOTO_WEATHER_EMAIL_TO }}
          PHOTO_WEATHER_EMAIL_TO_2: ${{ secrets.PHOTO_WEATHER_EMAIL_TO_2 }}
          PHOTO_WEATHER_DEBUG_EMAIL_TO: ${{ secrets.PHOTO_WEATHER_DEBUG_EMAIL_TO }}
          PHOTO_BRIEF_TRIGGER_PATH: ${{ secrets.PHOTO_BRIEF_TRIGGER_PATH }}
          PHOTO_WEATHER_LAT: ${{ secrets.PHOTO_WEATHER_LAT }}
          PHOTO_WEATHER_LON: ${{ secrets.PHOTO_WEATHER_LON }}
          PHOTO_WEATHER_LOCATION: ${{ secrets.PHOTO_WEATHER_LOCATION }}
          PHOTO_WEATHER_TIMEZONE: ${{ secrets.PHOTO_WEATHER_TIMEZONE }}
          PHOTO_WEATHER_ICAO: ${{ secrets.PHOTO_WEATHER_ICAO }}
          PHOTO_BRIEF_EDITORIAL_PRIMARY_PROVIDER: ${{ secrets.PHOTO_BRIEF_EDITORIAL_PRIMARY_PROVIDER }}
          PHOTO_BRIEF_EDITORIAL_PROMPT_MODE: ${{ secrets.PHOTO_BRIEF_EDITORIAL_PROMPT_MODE }}
          SUNSETHUE_API_KEY: ${{ secrets.SUNSETHUE_API_KEY }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APERTURE_GITHUB_PAT: ${{ secrets.APERTURE_GITHUB_PAT }}
        run: |
          python3 - <<'PY'
          import json, os

          trigger = os.environ['PHOTO_BRIEF_TRIGGER_PATH'].strip().strip('/')
          if not trigger:
              raise SystemExit("::error::PHOTO_BRIEF_TRIGGER_PATH is empty after normalization")

          # Write normalised trigger path for later steps
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"PHOTO_BRIEF_TRIGGER_PATH_NORMALIZED={trigger}\n")

          substitutions = {
              '__GROQ_API_KEY__': os.environ['GROQ_API_KEY'],
              '__TELEGRAM_BOT_TOKEN__': os.environ['TELEGRAM_BOT_TOKEN'],
              '__TELEGRAM_CHAT_ID__': os.environ['TELEGRAM_CHAT_ID'],
              '__SENDGRID_API_KEY__': os.environ['SENDGRID_API_KEY'],
              '__EMAIL_FROM__': os.environ['EMAIL_FROM'],
              '__PHOTO_WEATHER_EMAIL_TO__': os.environ['PHOTO_WEATHER_EMAIL_TO'],
              '__PHOTO_WEATHER_EMAIL_TO_2__': os.environ['PHOTO_WEATHER_EMAIL_TO_2'],
              '__PHOTO_WEATHER_DEBUG_EMAIL_TO__': os.environ['PHOTO_WEATHER_DEBUG_EMAIL_TO'],
              '__PHOTO_BRIEF_TRIGGER_PATH__': trigger,
              '__PHOTO_WEATHER_LAT__': os.environ['PHOTO_WEATHER_LAT'],
              '__PHOTO_WEATHER_LON__': os.environ['PHOTO_WEATHER_LON'],
              '__PHOTO_WEATHER_LOCATION__': os.environ['PHOTO_WEATHER_LOCATION'],
              '__PHOTO_WEATHER_TIMEZONE__': os.environ['PHOTO_WEATHER_TIMEZONE'],
              '__PHOTO_WEATHER_ICAO__': os.environ['PHOTO_WEATHER_ICAO'],
              '__PHOTO_BRIEF_EDITORIAL_PRIMARY_PROVIDER__': os.environ['PHOTO_BRIEF_EDITORIAL_PRIMARY_PROVIDER'],
              '__PHOTO_BRIEF_EDITORIAL_PROMPT_MODE__': os.environ['PHOTO_BRIEF_EDITORIAL_PROMPT_MODE'],
              '__SUNSETHUE_API_KEY__': os.environ['SUNSETHUE_API_KEY'],
              '__NASA_API_KEY__': os.environ['NASA_API_KEY'],
              '__GEMINI_API_KEY__': os.environ['GEMINI_API_KEY'],
              '__APERTURE_GITHUB_PAT__': os.environ['APERTURE_GITHUB_PAT'],
          }

          text = open('photography-weather-brief.json').read()
          for placeholder, value in substitutions.items():
              text = text.replace(placeholder, value)
          open('photography-weather-brief.json', 'w').write(text)
          PY

      - name: Verify no unsubstituted placeholders remain
        run: |
          missing=()
          for placeholder in \
            __GROQ_API_KEY__ \
            __TELEGRAM_BOT_TOKEN__ \
            __TELEGRAM_CHAT_ID__ \
            __SENDGRID_API_KEY__ \
            __EMAIL_FROM__ \
            __PHOTO_WEATHER_EMAIL_TO__ \
            __PHOTO_WEATHER_EMAIL_TO_2__ \
            __PHOTO_WEATHER_DEBUG_EMAIL_TO__ \
            __PHOTO_BRIEF_TRIGGER_PATH__ \
            __PHOTO_WEATHER_LAT__ \
            __PHOTO_WEATHER_LON__ \
            __PHOTO_WEATHER_LOCATION__ \
            __PHOTO_WEATHER_TIMEZONE__ \
            __PHOTO_WEATHER_ICAO__ \
            __PHOTO_BRIEF_EDITORIAL_PRIMARY_PROVIDER__ \
            __PHOTO_BRIEF_EDITORIAL_PROMPT_MODE__ \
            __SUNSETHUE_API_KEY__ \
            __NASA_API_KEY__ \
            __GEMINI_API_KEY__ \
            __APERTURE_GITHUB_PAT__
          do
            if grep -qF "$placeholder" photography-weather-brief.json; then
              missing+=("$placeholder")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Unsubstituted placeholders found:"
            printf '%s\n' "${missing[@]}"
            exit 1
          fi

      - name: Parse workflow JSON for n8n API
        id: parse
        run: |
          # Extract only the fields n8n accepts on create/update
          python3 -c "
          import json, sys
          wf = json.load(open('photography-weather-brief.json'))
          body = {
              'name': wf['name'],
              'nodes': wf['nodes'],
              'connections': wf['connections'],
              'settings': wf.get('settings', {})
          }
          json.dump(body, open('workflow-body.json', 'w'))
          print(wf['name'])
          " > workflow_name.txt

      - name: Look up existing workflow by name
        id: lookup
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          WORKFLOW_NAME_FILE: workflow_name.txt
        run: |
          RESPONSE=$(curl --ipv4 --retry 5 --retry-delay 2 --retry-all-errors -sS \
            -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            -H "Accept: application/json" \
            "${N8N_BASE_URL_NORM}/api/v1/workflows?limit=100")

          # Find workflow ID by name (reads name from env to avoid shell injection)
          WORKFLOW_ID=$(echo "$RESPONSE" | WORKFLOW_NAME="$(cat "$WORKFLOW_NAME_FILE")" python3 -c "
          import json, sys, os
          data = json.load(sys.stdin)
          name = os.environ['WORKFLOW_NAME']
          matches = [w['id'] for w in data['data'] if w['name'] == name]
          print(matches[0] if matches else '')
          ")

          echo "workflow_id=${WORKFLOW_ID}" >> "$GITHUB_OUTPUT"
          if [ -n "$WORKFLOW_ID" ]; then
            echo "Found existing workflow: ${WORKFLOW_ID}"
          else
            echo "No existing workflow found — will create"
          fi

      - name: Deactivate existing workflow before update
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          WORKFLOW_ID: ${{ steps.lookup.outputs.workflow_id }}
        run: |
          if [ -n "$WORKFLOW_ID" ]; then
            echo "Deactivating workflow ${WORKFLOW_ID} before update..."
            curl --ipv4 --retry 3 --retry-delay 2 --retry-all-errors -s \
              -X POST \
              -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
              -H "Accept: application/json" \
              "${N8N_BASE_URL_NORM}/api/v1/workflows/${WORKFLOW_ID}/deactivate" \
              -o /dev/null || true
            echo "Deactivated — webhooks torn down"
          else
            echo "No existing workflow — skipping deactivation"
          fi

      - name: Create or update workflow
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          WORKFLOW_ID: ${{ steps.lookup.outputs.workflow_id }}
        run: |
          if [ -n "$WORKFLOW_ID" ]; then
            echo "Updating workflow ${WORKFLOW_ID}..."
            HTTP_CODE=$(curl --ipv4 --retry 5 --retry-delay 2 --retry-all-errors -sS -o response.json -w '%{http_code}' \
              -X PUT \
              -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d @workflow-body.json \
              "${N8N_BASE_URL_NORM}/api/v1/workflows/${WORKFLOW_ID}")
          else
            echo "Creating new workflow..."
            HTTP_CODE=$(curl --ipv4 --retry 5 --retry-delay 2 --retry-all-errors -sS -o response.json -w '%{http_code}' \
              -X POST \
              -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d @workflow-body.json \
              "${N8N_BASE_URL_NORM}/api/v1/workflows")
          fi

          if [[ "$HTTP_CODE" != 2* ]]; then
            echo "::error::n8n API returned HTTP ${HTTP_CODE}"
            cat response.json
            exit 1
          fi

          # Capture the ID (for activate step)
          UPSERTED_ID=$(python3 -c "import json; print(json.load(open('response.json'))['id'])")
          echo "workflow_id=${UPSERTED_ID}" >> "$GITHUB_ENV"
          echo "Workflow upserted: ${UPSERTED_ID}"

      - name: Activate workflow
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          echo "Activating workflow ${workflow_id}..."
          HTTP_CODE=$(curl --ipv4 --retry 5 --retry-delay 2 --retry-all-errors -s \
            -o activate-response.json -w '%{http_code}' \
            -X POST \
            -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            -H "Accept: application/json" \
            "${N8N_BASE_URL_NORM}/api/v1/workflows/${workflow_id}/activate")

          if [[ "$HTTP_CODE" != 2* ]]; then
            echo "::error::Activate returned HTTP ${HTTP_CODE}"
            cat activate-response.json
            exit 1
          fi

          # Verify the workflow is actually active
          ACTIVE=$(python3 -c "import json; print(json.load(open('activate-response.json')).get('active', False))")
          if [ "$ACTIVE" != "True" ]; then
            echo "::error::Workflow is not active after activation call"
            cat activate-response.json
            exit 1
          fi

          echo "Workflow ${workflow_id} activated successfully"

      - name: Trigger workflow via webhook
        run: |
          WEBHOOK_URL="${N8N_BASE_URL_NORM}/webhook/${PHOTO_BRIEF_TRIGGER_PATH_NORMALIZED}"
          echo "Triggering workflow via POST ${WEBHOOK_URL}..."
          HTTP_CODE=$(curl --ipv4 --retry 3 --retry-delay 2 --retry-all-errors -sS \
            -o trigger-response.json -w '%{http_code}' \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{"triggerSource": "github-actions-deploy"}' \
            "${WEBHOOK_URL}")

          cat trigger-response.json

          if [[ "$HTTP_CODE" != 2* ]]; then
            echo "::error::Webhook trigger returned HTTP ${HTTP_CODE}"
            exit 1
          fi

          echo "Workflow triggered successfully (HTTP ${HTTP_CODE})"
